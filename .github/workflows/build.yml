name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Web Frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Upload Web Dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist/

  build-android-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Android Frontend
        run: |
          cd app/Android/frontend
          npm install
          npm run build
      - name: Upload Android Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: android-frontend-dist
          path: app/Android/frontend/dist/

  build-desktop-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Desktop Frontend
        run: |
          cd app/Desktop/frontend
          npm install
          npm run build
      - name: Upload Desktop Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: desktop-frontend-dist
          path: app/Desktop/frontend/dist/

  build-android:
    needs: build-android-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Download Android Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: android-frontend-dist
          path: app/Android/frontend/dist/
      - name: Setup Capacitor
        run: |
          cd app/Android
          npm install
          npx cap add android
          npx cap sync android
      - name: Build APK
        run: |
          cd app/Android/android
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/Android/android/app/build/outputs/apk/debug/*.apk

  build-desktop:
    needs: build-desktop-frontend
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download Desktop Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: desktop-frontend-dist
          path: app/Desktop/frontend/dist/
      - name: Install Desktop Dependencies
        run: |
          cd app/Desktop
          npm install
      - name: Build Desktop App
        run: |
          cd app/Desktop
          if [ "$RUNNER_OS" = "Windows" ]; then
            npm run build:win
          elif [ "$RUNNER_OS" = "macOS" ]; then
            npm run build:mac
          else
            npm run build:linux
          fi
        shell: bash
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            app/Desktop/dist/*.exe
            app/Desktop/dist/*.dmg
            app/Desktop/dist/*.AppImage
            app/Desktop/dist/*.deb

  release:
    needs: [build-web, build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/desktop-ubuntu-latest/*
            artifacts/desktop-macos-latest/*
            artifacts/desktop-windows-latest/*
