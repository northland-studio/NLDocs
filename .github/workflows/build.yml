name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Job 1: Build frontend
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist/

  # Job 2: Build Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
      - name: Install Capacitor dependencies
        working-directory: app/Android
        run: npm install
      - name: Sync Capacitor
        working-directory: app/Android
        run: npx cap sync android
      - name: Build APK
        working-directory: app/Android/android
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/Android/android/app/build/outputs/apk/debug/*.apk

  # Job 3: Build Desktop apps (matrix)
  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
      - name: Install Electron dependencies
        working-directory: app/Desktop
        run: npm install
      - name: Build desktop app
        working-directory: app/Desktop
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            app/Desktop/dist/*.exe
            app/Desktop/dist/*.dmg
            app/Desktop/dist/*.AppImage
            app/Desktop/dist/*.snap

  # Job 4: Create GitHub Release
  release:
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-desktop]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/desktop-ubuntu-latest/*
            artifacts/desktop-macos-latest/*
            artifacts/desktop-windows-latest/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
